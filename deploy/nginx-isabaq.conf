# Nginx config for isabaq.kz (host server)
# Use this if nginx runs on the HOST (not in Docker) for SSL termination.
# 1. Change docker-compose frontend ports to "8080:80"
# 2. Place this in /etc/nginx/sites-available/isabaq.kz
# 3. ln -s /etc/nginx/sites-available/isabaq.kz /etc/nginx/sites-enabled/
#
# SSL: run certbot first:
#   certbot certonly --nginx -d isabaq.kz -d www.isabaq.kz
# Then uncomment the server block below and comment the HTTP-only block.

# HTTP -> redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name isabaq.kz www.isabaq.kz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name isabaq.kz www.isabaq.kz;

    ssl_certificate /etc/letsencrypt/live/isabaq.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/isabaq.kz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
