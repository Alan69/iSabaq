services:
  db:
    image: postgres:16-alpine
    container_name: edudesk-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-edudesk}
      - POSTGRES_USER=${POSTGRES_USER:-edudesk}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-edudesk}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edudesk}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./edudesk_backend
      dockerfile: Dockerfile
    container_name: edudesk-backend
    env_file: .env
    environment:
      - DEBUG=false
      - ALLOWED_HOSTS=isabaq.kz,www.isabaq.kz,localhost,127.0.0.1
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB:-edudesk}
      - POSTGRES_USER=${POSTGRES_USER:-edudesk}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-edudesk}
      - MEDIA_ROOT=/app/media
    volumes:
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./edudesk_frontend
      dockerfile: Dockerfile
    container_name: edudesk-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  backend_media:
  postgres_data:
